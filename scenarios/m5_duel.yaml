#
# M5 training fixture: m2_duel loadouts with realistic arena HP pools and a
# duration cap above the natural kill time, so matches are death-decided
# (real arena matches do not draw at 60 s).
#
# Changes vs m2_duel (owner-approved 2026-06-10):
#   - max_hp 25000 -> 10000 per side. Community-documented target for a
#     properly geared TBC arena warrior is ~10k+ unbuffed (phase-2 guides;
#     source_status: secondary). 25000 made m2_duel@60s draw-dominant (94%
#     of scripted-vs-scripted matches at N=500) and put decisive kills at
#     the damage-budget ceiling.
#   - duration_ms 60000 -> 180000: safety cap only; scripted-vs-scripted
#     median kill is well under it at these pools.
# m2_duel itself is untouched (golden traces preserved).

