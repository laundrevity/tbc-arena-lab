#
# M1 fixture: BOTH warriors auto-attack, facing each other in melee.
# Exercises interleaved swing timers under the event total order,
# parry-haste on both sides (spec M-010), rage on both sides, and
# death-of-either-unit.
#
# Asymmetric loadouts on purpose:
#   - attacker: slow two-hander (320-480 @ 3.60s), no shield
#   - defender: one-hander (150-280 @ 2.60s) + shield (block vs the attacker
#     only; the attacker has no shield so the reverse table has no block row)
# All chances per-myriad; positions/facings mutual-frontal for both units.

