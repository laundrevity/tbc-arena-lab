#
# M0 fixture: attacker BEHIND the defender. Reduced PvP table: miss / crit /
# hit only — dodge, parry and block are frontal-only (spec M-001/M-008), and
# the defender carries no shield here so the no-shield gate is exercised too
# (defender dodge/parry/block chances stay pinned nonzero on purpose: the
# positional gate alone must zero them).
#
# Defender faces +x (facing 0); attacker stands 200 cm BEHIND (-x), facing
# +x (0 mrad) toward the defender's back. Stats otherwise identical to
# m0_front_shield; chances per-myriad.

